name: bmad-ui-ci

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: _bmad-ui/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: _bmad-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: _bmad-ui

      - name: Lint
        run: pnpm check:lint
        working-directory: _bmad-ui

      - name: Type check
        run: pnpm check:types
        working-directory: _bmad-ui

      - name: Tests
        run: pnpm check:tests
        working-directory: _bmad-ui

      - name: Build
        run: pnpm build
        working-directory: _bmad-ui

      - name: Summary
        if: always()
        run: |
          echo "## CI Results — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          TRIGGER="${{ github.event_name }}"
          echo "| Commit | \`${COMMIT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${TRIGGER} |" >> $GITHUB_STEP_SUMMARY
          if [ "${TRIGGER}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.number }}"
            echo "| PR | #${PR_NUMBER} |" >> $GITHUB_STEP_SUMMARY
          fi
